<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}TaskFlow{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --surface2:  #1a1e2a;
      --border:    #252a38;
      --accent:    #6c63ff;
      --accent2:   #ff6584;
      --green:     #22d3a5;
      --orange:    #f59e0b;
      --red:       #ef4444;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius:    12px;
      --sidebar-w: 240px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 100;
    }

    .logo {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      padding: 0 24px 32px;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent);
    }

    .nav-section {
      padding: 0 12px;
      flex: 1;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      padding: 0 12px 10px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      margin-bottom: 2px;
    }

    .nav-link:hover, .nav-link.active {
      background: var(--surface2);
      color: var(--text);
    }

    .nav-link.active { color: var(--accent); }
    .nav-link i { width: 18px; text-align: center; font-size: 15px; }

    .nav-link .badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Main content ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 40px;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .page-title {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-body);
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.18s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #7c75ff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.4); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--border); }

    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .btn-danger:hover { background: var(--red); color: #fff; }

    .btn-success {
      background: rgba(34,211,165,0.12);
      color: var(--green);
      border: 1px solid rgba(34,211,165,0.25);
    }
    .btn-success:hover { background: var(--green); color: #000; }

    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.s-purple::before { background: var(--accent); }
    .stat-card.s-green::before  { background: var(--green); }
    .stat-card.s-red::before    { background: var(--red); }
    .stat-card.s-orange::before { background: var(--orange); }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-card.s-purple .stat-value { color: var(--accent); }
    .stat-card.s-green  .stat-value { color: var(--green); }
    .stat-card.s-red    .stat-value { color: var(--red); }
    .stat-card.s-orange .stat-value { color: var(--orange); }

    /* ── Section heading ── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* ── Priority badges ── */
    .priority {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .priority-high   { background: rgba(239,68,68,0.12);  color: var(--red);    border: 1px solid rgba(239,68,68,0.25); }
    .priority-medium { background: rgba(245,158,11,0.12); color: var(--orange); border: 1px solid rgba(245,158,11,0.25); }
    .priority-low    { background: rgba(34,211,165,0.10); color: var(--green);  border: 1px solid rgba(34,211,165,0.2); }

    /* ── Messages ── */
    .messages { margin-bottom: 20px; }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 8px;
      border: 1px solid;
    }
    .alert-success { background: rgba(34,211,165,0.08); color: var(--green); border-color: rgba(34,211,165,0.2); }
    .alert-error   { background: rgba(239,68,68,0.08);  color: var(--red);   border-color: rgba(239,68,68,0.2); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: fadeUp 0.35s ease both; }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.10s; }
    .delay-3 { animation-delay: 0.15s; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-dot"></div>
      TaskFlow
    </div>

    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a href="{% url 'task-list' %}" class="nav-link {% block nav_list %}{% endblock %}">
        <i class="fas fa-layer-group"></i> All Tasks
      </a>
      <a href="{% url 'task-create' %}" class="nav-link {% block nav_create %}{% endblock %}">
        <i class="fas fa-plus-circle"></i> New Task
      </a>
      <a href="/admin/" class="nav-link">
        <i class="fas fa-sliders-h"></i> Admin Panel
      </a>
    </div>

    <div class="sidebar-footer">
      &copy; 2026 TaskFlow
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

</body>
</html>
